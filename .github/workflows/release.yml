name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to publish (e.g. v0.4.0-beta). Will be created if it does not exist."
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact_glob: "dist/*.dmg dist/*.zip dist/*.blockmap dist/*.yml"
          - os: windows-latest
            artifact_glob: "dist/*.exe dist/*.blockmap dist/*.yml"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Setup Node (for electron-builder tooling)
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Trust postinstall scripts
        # Explicitly allowlist only the native modules that need postinstall
        # scripts to build binaries. Avoid `--all`, which runs postinstall
        # hooks from every transitive dep and is a supply-chain footgun.
        shell: bash
        run: |
          set -euo pipefail
          for pkg in electron electron-winstaller @biomejs/biome @tailwindcss/oxide esbuild sharp core-js unrs-resolver protobufjs workerd; do
            bun pm trust "$pkg" || true
          done

      - name: Build Electron main + preload
        run: bun run build:electron

      - name: Build Next.js frontend
        run: bun run build

      - name: Apply app constants for packaging
        run: node scripts/apply-app-constants.js

      - name: Package app (electron-builder)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Skip code-signing / notarization for open-source beta builds.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: bunx electron-builder --publish never

      - name: Verify macOS microphone entitlement
        if: matrix.os == 'macos-14'
        shell: bash
        run: |
          set -euo pipefail
          app_path="$(find dist -name '*.app' -type d | head -n 1)"
          if [ -z "$app_path" ]; then
            echo "No .app bundle found under dist/"
            exit 1
          fi
          echo "Inspecting $app_path"
          # Unsigned beta builds (CSC_IDENTITY_AUTO_DISCOVERY=false) do not embed
          # entitlements via codesign. Mic access is declared in Info.plist and
          # configured in build/entitlements.mac*.plist for when signing is enabled.
          plutil -p "$app_path/Contents/Info.plist" | grep -q "NSMicrophoneUsageDescription"
          grep -q "com.apple.security.device.audio-input" build/entitlements.mac.plist
          grep -q "com.apple.security.device.audio-input" build/entitlements.mac.inherit.plist
          echo "Microphone Info.plist + entitlements config verified."

      - name: List built artifacts
        shell: bash
        run: ls -lh dist/ || dir dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.os }}-artifacts
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.blockmap
            dist/*.yml
          if-no-files-found: warn
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve tag name
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -lh release-assets/

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          draft: false
          # Mark only alpha / rc pre-releases as prerelease; beta builds are
          # promoted to the "Latest" channel so users see them on the Releases
          # page by default.
          prerelease: ${{ contains(steps.tag.outputs.name, 'alpha') || contains(steps.tag.outputs.name, 'rc') }}
          make_latest: "true"
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            release-assets/*.dmg
            release-assets/*.zip
            release-assets/*.exe
            release-assets/*.blockmap
            release-assets/*.yml

