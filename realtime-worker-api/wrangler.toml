name = "realtime-worker-api-prod"
main = "src/index.ts"
compatibility_date = "2025-03-25"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
enabled = false

[triggers]
crons = ["0 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "YYYYY-db"
database_id = "836c3d2f-b104-419d-ad77-e1ac5c38a397"
migrations_dir = "drizzle"

[[kv_namespaces]]
binding = "CONFIG_KV"
id = "6a114e2cb0504aed86bc71df3df45c7b"

[[unsafe.bindings]]
name = "COMPLETION_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 30, period = 60 }

# Quota: record consumption in dry-run; enforcement off until billing is ready.
[vars]
QUOTA_ENFORCEMENT = "false"
QUOTA_RECORD_CONSUMPTION = "true"
